<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>记账本 Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="记账本">
    <meta name="theme-color" content="#F2F2F7">
    <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23007AFF' rx='20'/%3E%3Ctext x='50' y='68' font-size='50' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'%3E%E8%B4%A6%3C/text%3E%3C/svg%3E">

    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-text-primary: #000000;
            --ios-text-secondary: #8E8E93;
            --ios-separator: rgba(60, 60, 67, 0.29);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text-primary);
            margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; /* 适配刘海屏 */
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 500px; margin: 0 auto; padding-bottom: 40px; }

        /* 顶部标题区域设计 */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 16px 10px;
        }

        .large-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 0.41px;
            margin: 0;
        }

        /* 安装到桌面按钮 */
        .install-btn {
            background-color: rgba(0, 122, 255, 0.1);
            color: var(--ios-blue);
            border: none;
            border-radius: 16px;
            padding: 6px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .install-btn:active { opacity: 0.7; }
        .install-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .section-header {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-text-secondary);
            margin: 25px 16px 8px;
        }

        .ios-group {
            background-color: var(--ios-card);
            border-radius: 10px;
            margin: 0 16px;
            overflow: hidden;
        }

        .input-row {
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            min-height: 44px;
        }
        .input-row:last-child { border-bottom: none; }
        .input-row label { width: 80px; font-size: 17px; cursor: pointer; }
        .input-row input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 17px;
            padding: 12px 0;
            background: transparent;
            color: var(--ios-text-primary);
            width: 100%;
        }
        .input-row input::placeholder { color: #C7C7CC; }

        .submit-btn {
            display: block;
            width: calc(100% - 32px);
            margin: 20px 16px;
            background-color: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            padding: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .submit-btn:active { opacity: 0.7; }
        .submit-btn:disabled { background-color: #A1C9F7; cursor: not-allowed; }

        .list-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            background-color: var(--ios-card);
        }
        .list-row:last-child { border-bottom: none; }
        
        .list-info { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .list-desc { font-size: 17px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } 
        .list-date { font-size: 13px; color: var(--ios-text-secondary); }
        .list-right { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .list-amount { font-size: 17px; font-weight: 500; }
        .text-blue { color: var(--ios-blue); }
        
        .delete-btn {
            color: var(--ios-red);
            background: none;
            border: none;
            font-size: 15px;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--ios-text-secondary);
            font-size: 15px;
        }

        /* 引导安装的弹窗遮罩 */
        #installGuide {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 10000;
            justify-content: center;
            align-items: flex-end;
            padding: 20px;
        }
        .guide-box {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 30px; /* 留出底部空间 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            animation: slideUp 0.3s ease-out;
        }
        .guide-box::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: white transparent transparent transparent;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #toast {
            position: fixed;
            top: -100px; left: 50%; transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8); color: white;
            padding: 12px 24px; border-radius: 20px; font-size: 15px;
            z-index: 9999; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show { top: 40px; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="installGuide" onclick="this.style.display='none'">
        <div class="guide-box">
            <h3 style="margin-top:0;">安装到手机桌面</h3>
            <p style="color:#666; font-size: 15px; line-height: 1.5;">
                1. 点击屏幕底部正中间的 <b>分享图标</b><br>
                <span style="font-size:24px;">⍐</span><br>
                2. 向上滑动菜单，选择 <b>「添加到主屏幕」</b><br>
                3. 点击右上角的 <b>「添加」</b>
            </p>
            <button style="margin-top:10px; padding:10px 20px; border-radius:10px; border:none; background:#eee; font-weight:bold;" onclick="document.getElementById('installGuide').style.display='none'">我知道了</button>
        </div>
    </div>

    <div class="container">
        <div class="header-area">
            <h1 class="large-title">记账本</h1>
            <button class="install-btn" id="installBtn" onclick="triggerInstall()">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                装到桌面
            </button>
        </div>

        <div class="section-header">记一笔</div>
        <form id="expenseForm">
            <div class="ios-group">
                <div class="input-row">
                    <label for="dateInput">日期</label>
                    <input type="date" id="dateInput" required>
                </div>
                <div class="input-row">
                    <label for="amountInput">金额</label>
                    <input type="number" id="amountInput" placeholder="0.00" step="0.01" min="0.01" required>
                </div>
                <div class="input-row">
                    <label for="descInput">备注</label>
                    <input type="text" id="descInput" placeholder="例如：午餐、交通" maxlength="50" required>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="submit-btn">保存记录</button>
        </form>

        <div class="section-header">月度统计</div>
        <div class="ios-group" id="monthlyList">
            <div class="empty-state">同步中...</div>
        </div>

        <div class="section-header">历史记录</div>
        <div class="ios-group" id="historyList">
            <div class="empty-state">正在建立实时连接...</div>
        </div>
    </div>

    <script type="module">
        // ==================
        // 安装到桌面逻辑 (PWA)
        // ==================
        let deferredPrompt;

        // 监听安卓系统的安装事件
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        // 隐藏如果是已经从桌面打开的，就不显示“安装按钮”了
        if (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('installBtn').style.display = 'none';
        }

        window.triggerInstall = async () => {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            if (isIOS) {
                // 苹果手机：弹出图文引导
                document.getElementById('installGuide').style.display = 'flex';
            } else if (deferredPrompt) {
                // 安卓手机：直接调起系统安装弹窗
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installBtn').style.display = 'none';
                }
                deferredPrompt = null;
            } else {
                // 其他情况兜底提示
                showToast("请点击浏览器菜单中的「添加到主屏幕」");
            }
        };

        // ==================
        // 数据库与业务逻辑 (完美继承上一版的实时监听功能)
        // ==================
        const SUPABASE_URL = 'https://htqjfniugsahibhkjszb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0cWpmbml1Z3NhaGliaGtqc3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDI2NDksImV4cCI6MjA4OTIxODY0OX0.pmMUaaLLZ-RWFt_bkFPFiSLmdM4LKbG6SI-q2TEe-j8';
        
        let supabase = null;
        let localData = []; 

        async function loadEngine() {
            const urls = [
                'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm',
                'https://esm.sh/@supabase/supabase-js@2'
            ];
            for (const url of urls) {
                try {
                    const mod = await import(url);
                    return mod.createClient;
                } catch (e) { console.warn("跳过故障节点"); }
            }
            throw new Error("网络环境受限，请尝试切换网络");
        }

        function subscribeToChanges() {
            supabase
                .channel('realtime-expenses')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, (payload) => {
                    fetchCloudData();
                    if (payload.eventType === 'DELETE') showToast('有一条记录被远程删除');
                })
                .subscribe();
        }

        async function bootstrap() {
            initDateUI();
            try {
                const createClient = await loadEngine();
                supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
                await fetchCloudData();
                subscribeToChanges();
            } catch (err) {
                document.getElementById('historyList').innerHTML = `<div class="empty-state" style="color:red;">连接失败: ${err.message}</div>`;
            }
        }
        bootstrap();

        async function fetchCloudData() {
            const { data, error } = await supabase
                .from('expenses')
                .select('*')
                .order('date', { ascending: false })
                .order('id', { ascending: false });

            if (!error) {
                localData = data || [];
                renderUI();
            }
        }

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const date = document.getElementById('dateInput').value;
            const amount = parseFloat(document.getElementById('amountInput').value);
            const desc = document.getElementById('descInput').value.trim();

            btn.disabled = true;
            btn.innerText = '发送中...';

            const { error } = await supabase.from('expenses').insert([{ date, amount, desc }]);
            
            if (!error) {
                showToast('保存成功', 'success');
                document.getElementById('amountInput').value = '';
                document.getElementById('descInput').value = '';
            } else {
                showToast('错误: ' + error.message);
            }
            btn.disabled = false;
            btn.innerText = '保存记录';
        });

        window.deleteItem = async (id) => {
            if (!confirm('确定删除？')) return;
            showToast('处理中...');
            await supabase.from('expenses').delete().eq('id', id);
        };

        function renderUI() {
            const historyList = document.getElementById('historyList');
            const monthlyList = document.getElementById('monthlyList');
            historyList.innerHTML = '';
            monthlyList.innerHTML = '';

            if (localData.length === 0) {
                const empty = '<div class="empty-state">暂无数据</div>';
                historyList.innerHTML = empty;
                monthlyList.innerHTML = empty;
                return;
            }

            const months = {};
            localData.forEach(item => {
                const val = Number(item.amount) || 0;
                const row = document.createElement('div');
                row.className = 'list-row';
                row.innerHTML = `
                    <div class="list-info">
                        <span class="list-desc">${escapeHTML(item.desc)}</span>
                        <span class="list-date">${escapeHTML(item.date)}</span>
                    </div>
                    <div class="list-right">
                        <span class="list-amount">￥${val.toFixed(2)}</span>
                        <button class="delete-btn" onclick="deleteItem('${item.id}')">删除</button>
                    </div>`;
                historyList.appendChild(row);
                const m = item.date.substring(0, 7);
                months[m] = (months[m] || 0) + val;
            });

            Object.keys(months).sort().reverse().forEach(m => {
                const row = document.createElement('div');
                row.className = 'list-row';
                row.innerHTML = `<span class="list-desc" style="font-weight:500;">${m}</span><span class="list-amount text-blue">￥${months[m].toFixed(2)}</span>`;
                monthlyList.appendChild(row);
            });
        }

        function initDateUI() {
            const d = new Date();
            document.getElementById('dateInput').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = 'show';
            setTimeout(() => t.className = '', 2000);
        }

        function escapeHTML(s) {
            return String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":"&#39;",'"':"&quot;"}[c]));
        }
    </script>
</body>
</html>
