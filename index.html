<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记账</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* iOS 颜色变量 */
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-text-primary: #000000;
            --ios-text-secondary: #8E8E93;
            --ios-separator: rgba(60, 60, 67, 0.29);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text-primary);
            margin: 0;
            padding: 0;
            padding-bottom: 40px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 500px; margin: 0 auto; }

        .large-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 0.41px;
            margin: 30px 16px 10px;
        }

        #status {
            text-align: center;
            font-size: 13px;
            height: 18px;
            margin-top: 10px;
            transition: color 0.3s;
        }
        .status-normal { color: var(--ios-text-secondary); }
        .status-error { color: var(--ios-red); font-weight: 500; }
        .status-success { color: #34C759; font-weight: 500; }

        .section-header {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-text-secondary);
            margin: 25px 16px 8px;
        }

        .ios-group {
            background-color: var(--ios-card);
            border-radius: 10px;
            margin: 0 16px;
            overflow: hidden;
        }

        .input-row {
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            min-height: 44px;
        }
        .input-row:last-child { border-bottom: none; }
        /* 增加 label 的点击响应区域 */
        .input-row label { width: 80px; font-size: 17px; cursor: pointer; }
        .input-row input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 17px;
            padding: 12px 0;
            background: transparent;
            color: var(--ios-text-primary);
        }
        .input-row input::placeholder { color: #C7C7CC; }

        .submit-btn {
            display: block;
            width: calc(100% - 32px);
            margin: 20px 16px;
            background-color: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            padding: 14px;
            cursor: pointer;
        }
        .submit-btn:active { opacity: 0.7; }
        .submit-btn:disabled { background-color: #A1C9F7; cursor: not-allowed; }

        .list-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            background-color: var(--ios-card);
        }
        .list-row:last-child { border-bottom: none; }
        
        .list-info { display: flex; flex-direction: column; gap: 4px; }
        .list-desc { font-size: 17px; font-weight: 400; word-break: break-all; } /* 防止长串字符撑破布局 */
        .list-date { font-size: 13px; color: var(--ios-text-secondary); }
        .list-right { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .list-amount { font-size: 17px; font-weight: 500; }
        .text-blue { color: var(--ios-blue); }
        
        .delete-btn {
            color: var(--ios-red);
            background: none;
            border: none;
            font-size: 15px;
            padding: 4px 8px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: var(--ios-text-secondary);
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status" class="status-normal"></div>
        <h1 class="large-title">记账本</h1>

        <div class="section-header">记一笔</div>
        <div class="ios-group">
            <div class="input-row">
                <label for="dateInput">日期</label>
                <input type="date" id="dateInput">
            </div>
            <div class="input-row">
                <label for="amountInput">金额</label>
                <input type="number" id="amountInput" placeholder="0.00" step="0.01" min="0.01">
            </div>
            <div class="input-row">
                <label for="descInput">备注</label>
                <input type="text" id="descInput" placeholder="例如：午餐、交通" maxlength="50">
            </div>
        </div>
        <button id="addBtn" class="submit-btn" onclick="addRecord()">保存</button>

        <div class="section-header">月度统计</div>
        <div class="ios-group" id="monthlyList"></div>

        <div class="section-header">历史记录</div>
        <div class="ios-group" id="historyList"></div>
    </div>

    <script>
        // 注意：请务必在 Supabase 后台中为 expenses 表配置 Row Level Security (RLS)！
        const SUPABASE_URL = 'https://htqjfniugsahibhkjszb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0cWpmbml1Z3NhaGliaGtqc3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDI2NDksImV4cCI6MjA4OTIxODY0OX0.pmMUaaLLZ-RWFt_bkFPFiSLmdM4LKbG6SI-q2TEe-j8';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let localData = []; 

        // XSS 防御：HTML 转义函数 (核心修复)
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag]));
        }

        // 安全地获取当前当地时间 YYYY-MM-DD
        function getLocalDateString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        window.onload = () => {
            document.getElementById('dateInput').value = getLocalDateString();
            loadData(); 
        };

        // 状态提示器
        function setStatus(msg, type = 'normal') {
            const statusEl = document.getElementById('status');
            statusEl.innerText = msg;
            statusEl.className = `status-${type}`;
            if(msg) {
                setTimeout(() => { statusEl.innerText = ''; }, 3000);
            }
        }

        // 加载数据
        async function loadData() {
            setStatus('正在同步云端数据...', 'normal');
            try {
                const { data, error } = await supabase
                    .from('expenses')
                    .select('*')
                    .order('date', { ascending: false })
                    .order('id', { ascending: false });

                if (error) throw error;
                
                localData = data || []; 
                render(localData);
                setStatus('同步成功', 'success');
            } catch (err) {
                console.error("Load Error:", err);
                setStatus('加载失败，请检查网络或配置', 'error');
            }
        }

        // 添加记录
        async function addRecord() {
            const date = document.getElementById('dateInput').value;
            const amountInputStr = document.getElementById('amountInput').value;
            const amount = parseFloat(amountInputStr);
            // 去除首尾空格
            const desc = document.getElementById('descInput').value.trim() || '日常支出';

            if (!date) {
                setStatus('请选择日期', 'error');
                return;
            }
            if (isNaN(amount) || amount <= 0) {
                setStatus('请输入有效金额', 'error');
                return;
            }

            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            setStatus('保存中...', 'normal');

            try {
                const { data, error } = await supabase
                    .from('expenses')
                    .insert([{ date, amount, desc }])
                    .select(); 

                if (error) throw error;

                if (data && data.length > 0) {
                    document.getElementById('amountInput').value = '';
                    document.getElementById('descInput').value = '';
                    
                    localData.unshift(data[0]); 
                    localData.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
                    render(localData);
                    
                    setStatus('已保存', 'success');
                }
            } catch (err) {
                console.error("Save Error:", err);
                alert('保存失败: ' + err.message);
                setStatus('保存失败', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        // 删除记录
        async function deleteItem(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            setStatus('删除中...', 'normal');
            try {
                const { error } = await supabase.from('expenses').delete().eq('id', id);
                if (error) throw error;
                
                localData = localData.filter(item => item.id !== id);
                render(localData);
                setStatus('已删除', 'success');
            } catch (err) {
                console.error("Delete Error:", err);
                alert('删除失败');
                setStatus('删除失败', 'error');
            }
        }

        // 渲染引擎
        function render(data) {
            const historyList = document.getElementById('historyList');
            const monthlyList = document.getElementById('monthlyList');
            historyList.innerHTML = '';
            monthlyList.innerHTML = '';

            if (data.length === 0) {
                historyList.innerHTML = '<div class="empty-state">暂无记录</div>';
                monthlyList.innerHTML = '<div class="empty-state">暂无数据</div>';
                return;
            }

            const months = {};

            data.forEach(item => {
                const safeAmount = Number(item.amount) || 0;

                const div = document.createElement('div');
                div.className = 'list-row';
                // 使用 escapeHTML 对用户可能输入的字符进行彻底转义
                div.innerHTML = `
                    <div class="list-info">
                        <span class="list-desc">${escapeHTML(item.desc)}</span>
                        <span class="list-date">${escapeHTML(item.date)}</span>
                    </div>
                    <div class="list-right">
                        <span class="list-amount">￥${safeAmount.toFixed(2)}</span>
                        <button class="delete-btn" onclick="deleteItem('${item.id}')">删除</button>
                    </div>
                `;
                historyList.appendChild(div);

                const m = item.date.substring(0, 7);
                months[m] = (months[m] || 0) + safeAmount;
            });

            Object.keys(months).sort().reverse().forEach(m => {
                const div = document.createElement('div');
                div.className = 'list-row';
                div.innerHTML = `
                    <span class="list-desc" style="font-weight:500;">${escapeHTML(m)}</span>
                    <span class="list-amount text-blue">￥${months[m].toFixed(2)}</span>
                `;
                monthlyList.appendChild(div);
            });
        }
    </script>
</body>
</html>
